name: Build Linux ARM

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      architectures:
        description: 'Architectures to build (space-separated: arm64 armv7)'
        required: false
        default: 'arm64 armv7'
      formats:
        description: 'Package formats (space-separated: deb rpm)'
        required: false
        default: 'deb rpm'

jobs:
  build-arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-latest
    strategy:
      matrix:
        format: [deb, rpm]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: 'stable'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libkeybinder-3.0-dev \
            libsecret-1-dev \
            rpm \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu

      - name: Install Flutter Distributor
        run: flutter pub global activate flutter_distributor

      - name: Get dependencies
        run: flutter pub get

      - name: Build for ARM64
        run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          flutter_distributor release --name release --jobs "linux-${{ matrix.format }}-arm64"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clashmi-linux-arm64-${{ matrix.format }}
          path: dist/**/*
          retention-days: 30

  build-armv7:
    name: Build Linux ARMv7
    runs-on: ubuntu-latest
    strategy:
      matrix:
        format: [deb, rpm]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: 'stable'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libkeybinder-3.0-dev \
            libsecret-1-dev \
            rpm \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf

      - name: Install Flutter Distributor
        run: flutter pub global activate flutter_distributor

      - name: Get dependencies
        run: flutter pub get

      - name: Build for ARMv7
        run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          flutter_distributor release --name release --jobs "linux-${{ matrix.format }}-armv7"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clashmi-linux-armv7-${{ matrix.format }}
          path: dist/**/*
          retention-days: 30

  create-release:
    name: Create Release
    needs: [build-arm64, build-armv7]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
