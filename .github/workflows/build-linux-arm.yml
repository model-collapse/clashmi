name: Build Linux ARM

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      architectures:
        description: 'Architectures to build (space-separated: arm64 armv7)'
        required: false
        default: 'arm64 armv7'
      formats:
        description: 'Package formats (space-separated: deb rpm)'
        required: false
        default: 'deb rpm'

jobs:
  build-arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-latest
    strategy:
      matrix:
        format: [deb, rpm]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build in ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v $PWD:/workspace \
            -w /workspace \
            ubuntu:22.04 \
            bash -c '
              export DEBIAN_FRONTEND=noninteractive && \
              apt-get update && \
              apt-get install -y curl git unzip xz-utils zip libglu1-mesa clang cmake ninja-build pkg-config libgtk-3-dev libayatana-appindicator3-dev libkeybinder-3.0-dev libsecret-1-dev rpm ca-certificates && \
              git clone https://github.com/flutter/flutter.git -b stable --depth 1 /flutter && \
              export PATH="/flutter/bin:$PATH" && \
              flutter doctor -v && \
              flutter pub get && \
              chmod +x download_mihomo.sh && \
              ./download_mihomo.sh && \
              flutter pub global activate flutter_distributor && \
              export PATH="$PATH:$HOME/.pub-cache/bin" && \
              flutter_distributor release --name release --jobs linux-${{ matrix.format }}-arm64
            '

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clashmi-linux-arm64-${{ matrix.format }}
          path: dist/**/*
          retention-days: 30

  build-armv7:
    name: Build Linux ARMv7
    runs-on: ubuntu-latest
    strategy:
      matrix:
        format: [deb, rpm]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build in ARMv7 container
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v $PWD:/workspace \
            -w /workspace \
            ubuntu:22.04 \
            bash -c '
              export DEBIAN_FRONTEND=noninteractive && \
              apt-get update && \
              apt-get install -y curl git unzip xz-utils zip libglu1-mesa clang cmake ninja-build pkg-config libgtk-3-dev libayatana-appindicator3-dev libkeybinder-3.0-dev libsecret-1-dev rpm ca-certificates && \
              git clone https://github.com/flutter/flutter.git -b stable --depth 1 /flutter && \
              export PATH="/flutter/bin:$PATH" && \
              flutter doctor -v && \
              flutter pub get && \
              chmod +x download_mihomo.sh && \
              ./download_mihomo.sh && \
              flutter pub global activate flutter_distributor && \
              export PATH="$PATH:$HOME/.pub-cache/bin" && \
              flutter_distributor release --name release --jobs linux-${{ matrix.format }}-armv7
            '

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clashmi-linux-armv7-${{ matrix.format }}
          path: dist/**/*
          retention-days: 30

  create-release:
    name: Create Release
    needs: [build-arm64, build-armv7]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
